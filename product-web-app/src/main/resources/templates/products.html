<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Produits</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white d-flex justify-content-between">
                <h3>Liste des Produits</h3>
                <span sec:authorize="isAuthenticated()">
                    <a th:href="@{/logout}" class="btn btn-warning btn-sm">Déconnexion</a>
                </span>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <form th:action="@{/products}" method="get" class="d-flex">
                        <input type="text" name="keyword" class="form-control me-2"
                               th:value="${keyword}" placeholder="Rechercher...">
                        <button type="submit" class="btn btn-primary">Chercher</button>
                    </form>
                </div>

                <a th:href="@{/products/add}" class="btn btn-success mb-3">Ajouter Produit</a>

                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Prix</th>
                            <th>Quantité</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}">1</td>
                            <td th:text="${product.name}">Produit</td>
                            <td th:text="${#numbers.formatDecimal(product.price, 2, 2)} + ' €'">0.00 €</td>
                            <td th:text="${product.quantity}">0</td>
                            <td>
                                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                                   class="btn btn-sm btn-warning">Éditer</a>
                                <a th:href="@{/products/delete/{id}(id=${product.id}, page=${currentPage}, keyword=${keyword})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('Supprimer ce produit ?')">Supprimer</a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <nav>
                    <ul class="pagination">
                        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${i == currentPage} ? 'active' : ''" class="page-item">
                            <a class="page-link"
                               th:href="@{/products(page=${i}, keyword=${keyword})}"
                               th:text="${i + 1}">1</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
