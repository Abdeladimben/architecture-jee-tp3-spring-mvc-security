<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier Produit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h3>Modifier Produit #<span th:text="${product.id}">1</span></h3>
            </div>
            <div class="card-body">
                <form th:action="@{/products/update/{id}(id=${product.id})}" th:object="${product}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" th:field="*{name}" class="form-control"
                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:errors="*{name}">Erreur</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prix</label>
                        <input type="number" step="0.01" th:field="*{price}" class="form-control"
                               th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:errors="*{price}">Erreur</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Quantité</label>
                        <input type="number" th:field="*{quantity}" class="form-control"
                               th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:errors="*{quantity}">Erreur</div>
                    </div>
                    <button type="submit" class="btn btn-warning">Mettre à jour</button>
                    <a th:href="@{/products}" class="btn btn-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
